<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriceMonitor — Product Price Monitoring System</title>
    <meta name="description" content="Real-time dashboard for tracking competitor pricing across Grailed, Fashionphile, and 1stdibs marketplaces.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/sidebar.css">
    <link rel="stylesheet" href="styles/dashboard.css">
    <link rel="stylesheet" href="styles/products.css">
    <link rel="stylesheet" href="styles/detail.css">
    <link rel="stylesheet" href="styles/components.css">
</head>
<body>
    <div id="app">
        <!-- Navigation Component -->
        <nav class="sidebar" id="sidebar">
            <div class="logo">
                <span class="logo-icon">📈</span>
                <h2>PriceMonitor<span class="accent">.ai</span></h2>
            </div>
            <ul class="nav-links" role="navigation">
                <li class="active"><a href="#" data-view="dashboard" id="nav-dashboard">
                    <span class="nav-icon">▦</span> Dashboard
                </a></li>
                <li><a href="#" data-view="products" id="nav-products">
                    <span class="nav-icon">◈</span> Products Hub
                </a></li>
                <li><a href="#" data-view="webhooks" id="nav-webhooks">
                    <span class="nav-icon">⬡</span> Webhooks
                </a></li>
            </ul>
            <div class="sidebar-footer">
                <span class="status-dot status-online"></span>
                <span class="status-label">API Connected</span>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="content-area" id="content-area">
            <header class="top-bar" id="top-bar">
                <div class="top-bar-left">
                    <h1 id="page-title">Dashboard Overview</h1>
                    <p class="page-subtitle" id="page-subtitle">Aggregate statistics across all tracked marketplaces</p>
                </div>
                <button class="btn-primary btn-refresh" id="trigger-refresh-btn">
                    <span class="btn-icon">↻</span> Sync Now
                </button>
            </header>

            <!-- Dynamic View Target -->
            <div id="dynamic-view" role="main">
                <div class="loader-container">
                    <div class="loader-spinner"></div>
                    <p>Connecting to API...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Chart.js for price history rendering -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Module load order matters: config → api → components → views → router -->
    <script src="js/config.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script src="js/components.js?v=2"></script>
    <script src="js/views/dashboard.js?v=2"></script>
    <script src="js/views/products.js?v=2"></script>
    <script src="js/views/detail.js?v=2"></script>
    <script src="js/views/webhooks.js?v=2"></script>
    <script src="js/router.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
</body>
</html>
